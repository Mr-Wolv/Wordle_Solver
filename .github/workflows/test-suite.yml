name: Test Suite

# Runs on every push/PR. The default `pytest` run INCLUDES the exhaustive
# 2,315-word x 6-domain closed-loop gate (pytest.ini has no addopts
# exclusion). We additionally run the frozen-bundle self-play test by opting
# it in via WS_BUILD_TEST=1 — it builds + launches the real EXE and proves the
# shipped artifact solves, so it is executed (not skipped) in CI.
on:
  push:
    branches: ["**"]          # run on every push, any branch
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    env:
      # Authoritative warnings gate: any DeprecationWarning / ResourceWarning
      # in the suite fails CI. The project mandates zero warnings, anywhere.
      PYTHONWARNINGS: error
      # Opt the heavy frozen-bundle EXE self-play test INTO the CI run.
      WS_BUILD_TEST: "1"
      # The package lives under src/ and is NOT pip-installed in CI (it is
      # injected via conftest for pytest). Bare `python -m wordle_solver...`
      # steps (build_matrix) need src/ on the path explicitly.
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate pattern matrix (derived from committed CSV)
        # scientific_word_data.csv + residual_optimal*.json + t1_h_opening.json
        # are committed (deterministic / generated offline). Only the fast
        # matrix is rebuilt here.
        run: |
          python -m wordle_solver.generators.build_matrix

      - name: Run full test suite (incl. exhaustive gate + frozen-bundle self-play)
        run: |
          python -m pytest -q
