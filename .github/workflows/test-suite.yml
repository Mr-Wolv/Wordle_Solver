name: Test Suite

on:
  push:
    branches: ["**"]          # run on every push, any branch
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Playwright is in requirements.txt; install only its browser when
          # the e2e tests are enabled. The e2e suite auto-skips if the browser
          # is absent, so CI stays green even without this download.
          python -m playwright install chromium || echo "chromium install skipped"

      - name: Generate data + pattern matrix (engine cannot import without these)
        # scientific_word_data.csv, residual_optimal.json and t1_h_opening.json
        # are committed (generated once, deterministic) so CI does NOT run the
        # slow network Data.py (wordfreq), the ~5-min build_residual_optimal.py,
        # or the multi-hour find_t1_h.py brute-force prover. We only (re)build
        # the fast derivable artifacts from the committed CSV.
        run: |
          python -m wordle_solver.generators.build_matrix
          python -c "from wordle_solver.engine import WordleEngine; e=WordleEngine(); e.get_suggestions(); e.get_suggestions(is_hard_mode=True)"

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Run exhaustive regression gate (all 2,315 answers, both modes)
        # Authoritative solve-rate contract. Excluded from the default run
        # via pytest.ini (-m "not exhaustive"); run explicitly here.
        run: |
          python -m pytest -q -m exhaustive
