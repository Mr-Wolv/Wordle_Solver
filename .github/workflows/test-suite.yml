name: Test Suite

# ---------------------------------------------------------------------------
# DEFAULT RUN = fast, non-exhaustive. The full 2,315-word x 6-domain closed-loop
# gate is HEAVY (recomputes all 47,814 games, ~18 min) and only needs to run when
# a change can actually regress one of the six locked domains. So:
#
#   * job `test`            -> runs the whole suite EXCEPT the exhaustive gate, on
#                               every push / PR / dispatch. This is the default,
#                               mandatory gate (zero-warnings enforced).
#   * job `exhaustive-gate` -> runs ONLY the exhaustive gate, and ONLY when the
#                               pushed/PR diff touches core engine/game/mode logic
#                               that the six domains are built from. We detect that
#                               with dorny/paths-filter; if no core path changed the
#                               job is skipped, so the full gate runs IF AND ONLY IF
#                               a core change risks a regression in one of the 6
#                               modes. `workflow_dispatch` always runs it (opt-in
#                               full proof on demand).
#
# The exhaustive gate recomputes from scratch (the cache is gitignored and is
# always cold in CI), so a green run is a real proof, not a cache read.
# ---------------------------------------------------------------------------
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  # Detect whether the diff touches core logic that feeds the six locked domains.
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'src/wordle_solver/engine/**'
              - 'src/wordle_solver/generators/**'
              - 'src/wordle_solver/data/**'
              - 'src/wordle_solver/app/web_server.py'
              - 'src/wordle_solver/app/cli.py'

  test:
    runs-on: windows-latest
    env:
      # Authoritative warnings gate: any DeprecationWarning / ResourceWarning
      # in the suite fails CI. The project mandates zero warnings, anywhere.
      PYTHONWARNINGS: error
      # Opt the heavy frozen-bundle EXE self-play test INTO the CI run.
      WS_BUILD_TEST: "1"
      # The package lives under src/ and is NOT pip-installed in CI (it is
      # injected via conftest for pytest). Bare `python -m wordle_solver...`
      # steps (build_matrix) need src/ on the path explicitly.
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # The e2e web suites (test_e2e_web.py, test_workflows_web.py) drive a
          # real Chromium via Playwright. Install the browser binary so those
          # tests run (and actually verify the UI), not just skip.
          python -m playwright install chromium

      - name: Generate pattern matrix (derived from committed CSV)
        # scientific_word_data.csv + residual_optimal*.json + t1_h_opening.json
        # are committed (deterministic / generated offline). Only the fast
        # matrix is rebuilt here.
        run: |
          python -m wordle_solver.generators.build_matrix

      - name: Run non-exhaustive suite (default gate, zero warnings)
        # Excludes the heavy `exhaustive` marker. That marker lives in its own
        # path-gated job below so everyday changes stay fast.
        run: |
          python -m pytest -m "not exhaustive" -W error -q

  exhaustive-gate:
    needs: changes
    # Run only when core engine logic affecting the 6 modes changed, or when the
    # run was triggered manually (workflow_dispatch). Otherwise skipped.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.core == 'true' }}
    runs-on: windows-latest
    env:
      PYTHONWARNINGS: error
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate pattern matrix
        run: |
          python -m wordle_solver.generators.build_matrix

      - name: Run exhaustive 6-domain gate (cold cache, full recompute)
        # Recomputes all 47,814 games from scratch. Green = real proof.
        run: |
          python -m pytest -m exhaustive -W error -q
