name: Build and Release Standalone EXE

on:
  push:
    tags:
      - 'v*' # Triggers whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Data and Matrix
      run: |
        python Data.py
        python build_matrix.py

    - name: Generate Turn-1 Cache (preload)
      run: |
        # Precompute both normal and hard mode first-guess results
        # so the exe starts instantly with zero delay
        python -c "from Engine import WordleEngine; e=WordleEngine(); e.get_suggestions(); e.get_suggestions(is_hard_mode=True)"

    - name: Generate Residual Optimal Specialist
      run: |
        # Builds residual_optimal.json (precomputed optimal-minimax trees for
        # the hard+hint residual clusters the greedy solver cannot close).
        python build_residual_optimal.py

    - name: Generate Turn-1 'h' Family-Safe Opening
      run: |
        # Builds t1_h_opening.json: a single solution index proven (via
        # find_t1_h.py) to solve every 'h'-containing answer word under HARD +
        # NYT hints. Used to close the lone `hatch` residual at turn 1 without
        # affecting any non-'h' family.
        python find_t1_h.py

    - name: Build with PyInstaller (WebView2 desktop app)
      run: |
        pyinstaller --noconfirm --clean desktop_app.spec

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: dist/Wordle-Strat-Console.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true # Automatically pulls commit messages into the description
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
