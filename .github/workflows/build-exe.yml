name: Build and Release Standalone EXE

# Triggered by pushing a tag starting with 'v' (e.g. v2.1.0). Builds the
# one-folder EXE and, crucially, VERIFIES the freshly-built artifact by
# running the frozen-bundle self-play test (WS_BUILD_TEST=1) against it
# before the GitHub Release is created. This proves the CI-built app is
# behaviourally equivalent to the source/locally-built one — not just that
# it compiles.
on:
  push:
    tags:
      - 'v*' # Triggers whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONWARNINGS: error
      WS_BUILD_TEST: "1"
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Data and Matrix
      run: |
        # scientific_word_data.csv is committed (deterministic, generated once
        # offline via wordle_solver.generators.build_word_data + wordfreq). Only
        # the matrix -- derived from it -- is rebuilt here.
        python -m wordle_solver.generators.build_matrix

    # residual_optimal*.json and t1_h_opening.json are committed artifacts
    # (generated offline by wordle_solver.generators.build_residual_optimal /
    # find_t1_h -- the latter is a multi-hour brute-force prover and must NOT
    # run in CI). They are bundled into the exe via the spec's `datas`, so no
    # regeneration step is needed here.

    - name: Build one-folder bundle (removes redundant root exe)
      run: python src/wordle_solver/desktop/build_dist.py

    - name: Verify built EXE via frozen-bundle self-play
      # Builds (if absent) + launches the actual EXE and self-plays the hard
      # no-hint residuals through its HTTP API. This is the behavioural
      # equivalence proof the release depends on — it must pass before we
      # publish the tag.
      run: |
        python -m pytest tests/test_frozen_bundle.py -q

    # NOTE: intentionally NO artifact upload. The user requires the app to be
    # reproducible from source anywhere, so the build above is the proof of
    # reproducibility — we do NOT attach a prebuilt .exe to the release. The
    # release page is still created (below) for the tag.

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true # Automatically pulls commit messages into the description
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
