name: Build and Release Standalone EXE

on:
  push:
    tags:
      - 'v*' # Triggers whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Data and Matrix
      run: |
        # scientific_word_data.csv is committed (deterministic, generated once
        # offline via wordle_solver.generators.build_word_data + wordfreq). Only
        # the matrix -- derived from it -- is rebuilt here.
        python -m wordle_solver.generators.build_matrix

    - name: Generate Turn-1 Cache (preload)
      run: |
        # Precompute both normal and hard mode first-guess results
        # so the exe starts instantly with zero delay
        python -c "from wordle_solver.engine import WordleEngine; e=WordleEngine(); e.get_suggestions(); e.get_suggestions(is_hard_mode=True)"

    # residual_optimal.json and t1_h_opening.json are committed artifacts
    # (generated offline by wordle_solver.generators.build_residual_optimal /
    # find_t1_h -- the latter is a multi-hour brute-force prover and must NOT
    # run in CI). They are bundled into the exe via the spec's `datas`, so no
    # regeneration step is needed here.

    - name: Build one-folder bundle (removes redundant root exe)
      run: python src/wordle_solver/desktop/build_dist.py

    # NOTE: intentionally NO artifact upload. The user requires the app to be
    # reproducible from source anywhere, so the build above is the proof of
    # reproducibility — we do NOT attach a prebuilt .exe to the release. The
    # release page is still created (below) for the tag.

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true # Automatically pulls commit messages into the description
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
