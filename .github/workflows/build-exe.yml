name: Build and Release Standalone EXE

# Triggered by pushing a tag starting with 'v' (e.g. v2.1.0). Builds the
# one-folder EXE and, crucially, VERIFIES the freshly-built artifact by
# running the frozen-bundle self-play test (WS_BUILD_TEST=1) against it
# before the GitHub Release is created. This proves the CI-built app is
# behaviourally equivalent to the source/locally-built one — not just that
# it compiles.
on:
  push:
    tags:
      - 'v*' # Triggers whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONWARNINGS: error
      WS_BUILD_TEST: "1"
      # The package lives under src/ and is NOT pip-installed in CI (it is
      # injected via conftest for pytest). Bare `python -m wordle_solver...`
      # steps (build_matrix, build_dist) need src/ on the path explicitly.
      PYTHONPATH: src
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Provision CPython 3.12.10 (build-standalone) + clean .venv_build
      # IMPORTANT: the frozen bundle's CPython runtime must match the LOCAL
      # build exactly. The local build (build_game.py) bootstraps .venv_build
      # from uv's managed cpython-3.12.10 (python-build-standalone). We use the
      # SAME provisioner here (NOT actions/setup-python, whose CPython distro
      # produces different python312.dll / libcrypto sizes at the same version
      # string). This makes the local and CI artifacts byte-comparable.
      run: |
        uv python install 3.12.10
        # Create the venv with the STDLIB `python -m venv` (not `uv venv`), so
        # pip is seeded via ensurepip -- this exactly mirrors build_game.py's
        # local path (uv-venv would omit pip). `uv python find` returns the
        # same python-build-standalone 3.12.10 the local build uses.
        $base = (uv python find 3.12.10 --no-project).Trim()
        & $base -m venv .venv_build
        .venv_build/Scripts/python.exe -m pip install --upgrade pip
        .venv_build/Scripts/python.exe -m pip install -r requirements.txt

    - name: Generate Data and Matrix
      run: |
        # scientific_word_data.csv is committed (deterministic, generated once
        # offline via wordle_solver.generators.build_word_data + wordfreq). Only
        # the matrix -- derived from it -- is rebuilt here.
        .venv_build/Scripts/python.exe -m wordle_solver.generators.build_matrix

    # residual_optimal*.json and t1_h_opening.json are committed artifacts
    # (generated offline by wordle_solver.generators.build_residual_optimal /
    # find_t1_h -- the latter is a multi-hour brute-force prover and must NOT
    # run in CI). They are bundled into the exe via the spec's `datas`, so no
    # regeneration step is needed here.

    - name: Build one-folder bundle (removes redundant root exe)
      run: .venv_build/Scripts/python.exe src/wordle_solver/desktop/build_dist.py

    - name: Verify built EXE via frozen-bundle self-play
      # Builds (if absent) + launches the actual EXE and self-plays the hard
      # no-hint residuals through its HTTP API. This is the behavioural
      # equivalence proof the release depends on — it must pass before we
      # publish the tag.
      run: |
        .venv_build/Scripts/python.exe -m pytest tests/test_frozen_bundle.py -q

    - name: Package built app folder for the release
      # CI built dist/Wordle-Strat-Console/ FROM SOURCE above (reproducible,
      # not a manual upload). Zip that exact one-folder app and attach it to
      # the release so the tag ships the same artifact you get locally from
      # `python build_game.py`.
      run: |
        Compress-Archive -Path dist/Wordle-Strat-Console -DestinationPath Wordle-Strat-Console.zip -Force

    - name: Create GitHub Release with built app attached
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: Wordle-Strat-Console.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
