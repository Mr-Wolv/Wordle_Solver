[pytest]
# The `exhaustive` marker runs the full 2,315-word closed-loop regression
# gate (all six domains). It is INCLUDED in the default run so that
# `pytest` runs the full suite by default. For a quick smoke test, use
# `python -m pytest -m "not exhaustive"`.
markers =
    exhaustive: full-corpus (all 2,315 NYT answers, six domains) closed-loop regression gate.
# No automatic exclusion; run all tests by default.
