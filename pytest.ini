[pytest]
# The `exhaustive` marker runs the full 2,315-word closed-loop regression
# gate (both modes). It is intentionally excluded from the default run so
# `pytest` stays fast in dev/CI; run it explicitly with:
#     python -m pytest -m exhaustive
addopts = -m "not exhaustive"
markers =
    exhaustive: full-corpus (all 2,315 NYT answers, both modes) closed-loop regression gate.
