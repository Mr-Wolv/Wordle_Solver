[pytest]
# The `exhaustive` marker runs the full 2,315-word closed-loop regression
# gate (all six domains). It is EXCLUDED from the default run via addopts so
# `pytest` stays fast (seconds) in dev and CI; run it explicitly with
# `python -m pytest -m exhaustive`. The fast 60-word subset still runs by
# default to prove the harness + structure are sound.
markers =
    exhaustive: full-corpus (all 2,315 NYT answers, six domains) closed-loop regression gate.
addopts = -m "not exhaustive"
